<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Mommy</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    min-height:100vh;
    overflow-x:hidden;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:1100px;
    text-align:center;
}

h1{
    font-size:3.5rem;
    margin-bottom:15px;
    animation:glow 2s infinite alternate;
}

.subtitle{
    font-size:1.3rem;
    margin-bottom:25px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:#2575fc;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

@keyframes glow{
    from{
        text-shadow:0 0 10px white;
    }
    to{
        text-shadow:0 0 25px yellow,
                    0 0 40px pink;
    }
}

/* Gallery */

.gallery{
    display:none;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    margin-top:40px;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    overflow:hidden;
    transform:translateY(40px);
    opacity:0;
    transition:1s;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.card.show{
    transform:translateY(0);
    opacity:1;
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
    cursor:pointer;
    transition:0.4s;
}

.card img:hover{
    transform:scale(1.05);
}

.card-content{
    padding:20px;
}

.card h2{
    margin-bottom:10px;
}

.card p{
    line-height:1.5;
}

/* Popup Image Viewer */

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.popup img{
    width:80%;
    max-width:900px;
    border-radius:20px;
    animation:zoom 0.5s ease;
}

@keyframes zoom{
    from{
        transform:scale(0.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.close{
    position:absolute;
    top:30px;
    right:40px;
    font-size:3rem;
    color:white;
    cursor:pointer;
}

/* Floating balloons */

.balloon{
    position:absolute;
    bottom:-100px;
    font-size:40px;
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>🎂Happy🎉</h1>
    <h1>🎂Birthday🎉</h1>
    <h1> Nnadiah </h1>
    <h1> Naa </h1>
    <h1> Nartehki </h1>

    <p class="subtitle">
        Tap below to reveal beautiful birthday memories ❤️
    </p>

    <button onclick="startCelebration()">
        Reveal Surprise 🎁
    </button>

    <!-- Music -->
    <audio id="birthdaySong" loop>
        <source src="the_mountain-happy-birthday-508020.mp3" type="audio/mp3">
    </audio>

    <!-- Gallery -->
    <div class="gallery" id="gallery">

        <div class="card">
            <img src="Naa.jpg"
                 onclick="openPopup(this.src)">
            <div class="card-content">
                <h2>Celebrate Today 🎈</h2>
                <p>
                    Wishing you happiness and unforgettable memories.
                </p>
            </div>
        </div>

        <div class="card">
            <img src="Naa1.jpg"
                 onclick="openPopup(this.src)">
            <div class="card-content">
                <h2>Dream Big ✨</h2>
                <p>
                    Keep shining brightly and achieving your dreams.
                </p>
            </div>
        </div>

        <div class="card">
            <img src="Naa2.jpg"
                 onclick="openPopup(this.src)">
            <div class="card-content">
                <h2>Special Moments ❤️</h2>
                <p>
                    May your year be filled with love and success.
                </p>
            </div>
        </div>

    </div>

</div>

<!-- Popup Viewer -->

<div class="popup" id="popup">

    <span class="close" onclick="closePopup()">&times;</span>

    <img id="popupImage">

</div>

<script>

function startCelebration(){

    // Play music
    document.getElementById("birthdaySong").play();

    // Show gallery
    const gallery = document.getElementById("gallery");

    gallery.style.display = "grid";

    // Animate cards
    const cards = document.querySelectorAll(".card");

    cards.forEach((card,index)=>{

        setTimeout(()=>{

            card.classList.add("show");

        }, index * 500);

    });

    // Floating balloons
    createBalloons();
}

function createBalloons(){

    setInterval(()=>{

        const balloon = document.createElement("div");

        balloon.classList.add("balloon");

        const emojis = ["🎈","🎉","🎂","💖","✨"];

        balloon.innerHTML =
            emojis[Math.floor(Math.random()*emojis.length)];

        balloon.style.left =
            Math.random() * 100 + "vw";

        balloon.style.animationDuration =
            (Math.random()*3 + 4) + "s";

        document.body.appendChild(balloon);

        setTimeout(()=>{

            balloon.remove();

        },7000);

    },300);
}

/* Popup Functions */

function openPopup(src){

    document.getElementById("popup").style.display = "flex";

    document.getElementById("popupImage").src = src;
}

function closePopup(){

    document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
